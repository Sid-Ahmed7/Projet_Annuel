version: '3.8'

services:
  # --- FRONTEND (Ajouté ici pour Swarm) ---
  front:
    image: arthurbrd/glotrush-front:latest
    ports:
      - "80:80"
    networks:
      - glotrush-net
    deploy:
      replicas: 1

  # --- BACKEND ---
  back:
    image: arthurbrd/glotrush-back:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/glotrush
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - TOTP_ENCRYPTION=${TOTP_ENCRYPTION}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SPRING_FLYWAY_PLACEHOLDERS_PASSWORD=${FLYWAY_ADMIN_PASS}
      - APP_FRONTEND_URL=http://${SERVER_IP} # Le front est sur le port 80
    networks:
      - glotrush-net
    volumes:
      - back_uploads:/app/uploads
    deploy:
      replicas: 1

  # --- DATABASE ---
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: glotrush
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - glotrush-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  glotrush-net:
    driver: overlay

volumes:
  postgres_data:
  back_uploads: