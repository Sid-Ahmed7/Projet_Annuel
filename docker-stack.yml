version: '3.8'

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: glotrush
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - glotrush-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager] # Garde la BDD sur le manager pour les données

  back:
    image: arthurbrd/glotrush-back:latest
    ports:
      - "8080:8080"
    environment:
      # Database
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/glotrush
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      
      # Security / TOTP
      - TOTP_ENCRYPTION=${TOTP_ENCRYPTION}
      
      # Mail
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME}
      
      # Stripe
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      
      # Flyway
      - SPRING_FLYWAY_PLACEHOLDERS_PASSWORD=${FLYWAY_ADMIN_PASS}
      
      # App
      - APP_FRONTEND_URL=http://${SERVER_IP}:5173
    networks:
      - glotrush-net
    volumes:
      - back_uploads:/app/uploads
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  glotrush-net:
    driver: overlay # Indispensable pour Swarm

volumes:
  postgres_data:
  back_uploads: # Volume nommé pour les images