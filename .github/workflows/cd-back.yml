name: CD Back

on:
  workflow_dispatch:
  #workflow_run:
    #workflows: [ "CI" ]
    #branches: [ feat/PROJ-8 ]
    #types: [ completed ]
  push:
    branches: [ feat/PROJ-8 ]
jobs:
  deploy:
    name: Build & Deploy Back
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push back
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: arthurbrd/glotrush-back:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull arthurbrd/glotrush-back:latest
            docker service update --image arthurbrd/glotrush-back:latest skaldly_back
